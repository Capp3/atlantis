name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv + sync project
        run: |
          python -m pip install -U pip setuptools uv
          uv sync --python 3.12 --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest with coverage
        env:
          QT_QPA_PLATFORM: offscreen
          ATLANTIS_HEADLESS: "1"
        run: |
          uv run pytest \
            --cov=atlantis \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  type-check:
    name: Type check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv + sync project
        run: |
          python -m pip install -U pip setuptools uv
          uv sync --python 3.12 --all-extras

      - name: Mypy
        run: uv run mypy atlantis

  docs-build:
    name: Docs strict build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv + sync project
        run: |
          python -m pip install -U pip setuptools uv
          uv sync --python 3.12 --all-extras

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict

  macos-smoke:
    name: macOS WebEngine smoke (opt-in)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv + sync project
        run: |
          python -m pip install -U pip setuptools uv
          uv sync --python 3.12 --all-extras

      - name: Pytest (default suite)
        env:
          QT_QPA_PLATFORM: offscreen
          ATLANTIS_HEADLESS: "1"
        run: uv run pytest -q
