# Pre-commit hooks for Atlantis. Run `uv run pre-commit install` once after
# cloning; subsequent commits will run these hooks automatically.
#
# To run on the whole tree manually: `uv run pre-commit run --all-files`.
#
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (atlantis)
        entry: uv run mypy atlantis
        language: system
        pass_filenames: false
